image: node:latest

stages:
  - Lint
  - Build
  - Test

backend:lint:
  stage: Lint
  before_script:
    - cd backend
    - npm ci
  script:
    - npm run lint

backend:build:
  stage: Build
  before_script:
    - cd backend
    - npm install
  script:
    - npm run build

backend:test:
  stage: Test
  before_script:
    - cd backend
    - npm ci
  script:
    - npm test

frontend:lint:
  stage: Lint
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint

frontend:build:
  stage: Build
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build

frontend:test:
  stage: Test
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm test

ai_service_chat:lint:
  stage: Lint
  script:
    - cd ai_service_chat
    - python -m venv .venv
    - .venv/bin/pip install -r requirements-dev.txt
    - .venv/bin/flake8 app_backend tests

ai_service_chat:test:
  stage: Test
  script:
    - cd ai_service_chat
    - python -m venv .venv
    - .venv/bin/pip install -r requirements.txt -r requirements-dev.txt
    - .venv/bin/pytest
