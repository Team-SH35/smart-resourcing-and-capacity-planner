image: node:latest

stages:
  - Build
  - Test

backend:build:
  stage: Build
  before_script:
    - cd backend
    - npm ci
  script:
    - npm run build

backend:test:
  stage: Test
  before_script:
    - cd backend
    - npm ci
  script:
    - npm test

frontend:build:
  stage: Build
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build

frontend:test:
  stage: Test
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm test
