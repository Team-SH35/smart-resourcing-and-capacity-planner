services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - sqlite-db:/database
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  database:
    build: 
      context: ./database
    volumes:
      - sqlite-db:/database
volumes:
  sqlite-db: