services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - sqlite-db:/database
    ports:
      - "4000:4000"
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  database:
    build:
      context: ./database
    volumes:
      - sqlite-db:/database

  ai_service:
    build:
      context: ./ai_service_chat
      dockerfile: Dockerfile
    container_name: ai_service
    env_file:
      - ./ai_service_chat/.env
    environment:
      - BACKEND_URL=http://backend:4000
    ports:
      - "8000:8000"
    depends_on:
      - backend

volumes:
  sqlite-db: